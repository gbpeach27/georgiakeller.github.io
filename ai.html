<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Snake Arena</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      overflow: hidden;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.65);
      padding: 14px 16px;
      border-radius: 12px;
      max-width: 340px;
      line-height: 1.4;
      border: 1px solid rgba(255,255,255,0.12);
    }

    #ui h1 {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    #ui p {
      margin: 6px 0;
      font-size: 14px;
    }

    #score {
      font-weight: bold;
      font-size: 16px;
      margin-top: 8px;
    }

    #message {
      margin-top: 10px;
      font-weight: bold;
      font-size: 16px;
    }

    #restartBtn {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #2ecc71;
      color: white;
      cursor: pointer;
      font-weight: bold;
      display: none;
    }

    #restartBtn:hover {
      filter: brightness(1.08);
    }

    canvas {
      display: block;
      background:
        radial-gradient(circle at center, #1c1c1c 0%, #101010 70%);
    }
  </style>
</head>
<body>
  <div id="ui">
    <h1>Mini Snake Arena</h1>
    <p>Move your mouse to guide the snake.</p>
    <p>Eat 10 glowing pixels to win.</p>
    <p>Avoid the red obstacles.</p>
    <div id="score">Pixels eaten: 0 / 10</div>
    <div id="message">Start moving your mouse.</div>
    <button id="restartBtn">Play Again</button>
  </div>

  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const messageEl = document.getElementById("message");
    const restartBtn = document.getElementById("restartBtn");

    let mouse = { x: 0, y: 0 };
    let gameOver = false;
    let won = false;

    const WIN_SCORE = 10;
    const PIXEL_COUNT = 18;
    const OBSTACLE_COUNT = 6;

    let snake, foods, obstacles, score;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function distance(x1, y1, x2, y2) {
      return Math.hypot(x2 - x1, y2 - y1);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function createSnake() {
      const startX = canvas.width / 2;
      const startY = canvas.height / 2;
      const segments = [];

      for (let i = 0; i < 20; i++) {
        segments.push({
          x: startX - i * 10,
          y: startY
        });
      }

      return {
        x: startX,
        y: startY,
        radius: 12,
        speed: 2.8,
        segments
      };
    }

    function createFood() {
      return {
        x: random(30, canvas.width - 30),
        y: random(30, canvas.height - 30),
        radius: 5 + Math.random() * 3
      };
    }

    function createObstacle() {
      const width = random(70, 140);
      const height = random(40, 110);
      return {
        x: random(30, canvas.width - width - 30),
        y: random(30, canvas.height - height - 30),
        width,
        height
      };
    }

    function foodTouchesObstacle(food, obstacle) {
      return (
        food.x + food.radius > obstacle.x &&
        food.x - food.radius < obstacle.x + obstacle.width &&
        food.y + food.radius > obstacle.y &&
        food.y - food.radius < obstacle.y + obstacle.height
      );
    }

    function foodTooCloseToSnake(food) {
      return distance(food.x, food.y, snake.x, snake.y) < 100;
    }

    function createFoods() {
      const arr = [];
      let tries = 0;

      while (arr.length < PIXEL_COUNT && tries < 2000) {
        const f = createFood();
        let valid = true;

        for (const obs of obstacles) {
          if (foodTouchesObstacle(f, obs)) {
            valid = false;
            break;
          }
        }

        if (foodTooCloseToSnake(f)) valid = false;

        for (const other of arr) {
          if (distance(f.x, f.y, other.x, other.y) < 18) {
            valid = false;
            break;
          }
        }

        if (valid) arr.push(f);
        tries++;
      }

      return arr;
    }

    function createObstacles() {
      const arr = [];
      let tries = 0;

      while (arr.length < OBSTACLE_COUNT && tries < 2000) {
        const obs = createObstacle();
        let valid = true;

        const margin = 140;

        if (
          obs.x < canvas.width / 2 + margin &&
          obs.x + obs.width > canvas.width / 2 - margin &&
          obs.y < canvas.height / 2 + margin &&
          obs.y + obs.height > canvas.height / 2 - margin
        ) {
          valid = false;
        }

        for (const other of arr) {
          const overlap = !(
            obs.x + obs.width + 25 < other.x ||
            obs.x > other.x + other.width + 25 ||
            obs.y + obs.height + 25 < other.y ||
            obs.y > other.y + other.height + 25
          );

          if (overlap) {
            valid = false;
            break;
          }
        }

        if (valid) arr.push(obs);
        tries++;
      }

      return arr;
    }

    function resetGame() {
      gameOver = false;
      won = false;
      score = 0;
      snake = createSnake();
      obstacles = createObstacles();
      foods = createFoods();

      mouse.x = snake.x;
      mouse.y = snake.y;

      scoreEl.textContent = `Pixels eaten: ${score} / ${WIN_SCORE}`;
      messageEl.textContent = "Start moving your mouse.";
      restartBtn.style.display = "none";
    }

    function pointInObstacle(x, y, obstacle, padding = 0) {
      return (
        x > obstacle.x - padding &&
        x < obstacle.x + obstacle.width + padding &&
        y > obstacle.y - padding &&
        y < obstacle.y + obstacle.height + padding
      );
    }

    function checkSnakeCollision() {
      for (const seg of snake.segments) {
        for (const obs of obstacles) {
          if (pointInObstacle(seg.x, seg.y, obs, snake.radius * 0.4)) {
            gameOver = true;
            won = false;
            messageEl.textContent = "You hit an obstacle and lost.";
            restartBtn.style.display = "inline-block";
            return;
          }
        }
      }
    }

    function updateSnake() {
      const dx = mouse.x - snake.x;
      const dy = mouse.y - snake.y;
      const dist = Math.hypot(dx, dy);

      if (dist > 1) {
        snake.x += (dx / dist) * snake.speed;
        snake.y += (dy / dist) * snake.speed;
      }

      snake.x = clamp(snake.x, snake.radius, canvas.width - snake.radius);
      snake.y = clamp(snake.y, snake.radius, canvas.height - snake.radius);

      snake.segments[0].x = snake.x;
      snake.segments[0].y = snake.y;

      for (let i = 1; i < snake.segments.length; i++) {
        const prev = snake.segments[i - 1];
        const curr = snake.segments[i];
        const followDx = prev.x - curr.x;
        const followDy = prev.y - curr.y;
        const followDist = Math.hypot(followDx, followDy);
        const desired = 10;

        if (followDist > desired) {
          curr.x += (followDx / followDist) * (followDist - desired) * 0.35;
          curr.y += (followDy / followDist) * (followDist - desired) * 0.35;
        }
      }
    }

    function updateFood() {
      for (let i = foods.length - 1; i >= 0; i--) {
        const food = foods[i];
        if (distance(snake.x, snake.y, food.x, food.y) < snake.radius + food.radius + 3) {
          foods.splice(i, 1);
          score++;
          snake.segments.push({
            x: snake.segments[snake.segments.length - 1].x,
            y: snake.segments[snake.segments.length - 1].y
          });

          scoreEl.textContent = `Pixels eaten: ${score} / ${WIN_SCORE}`;

          if (score >= WIN_SCORE) {
            gameOver = true;
            won = true;
            messageEl.textContent = "You ate 10 pixels and won!";
            restartBtn.style.display = "inline-block";
            return;
          }

          messageEl.textContent = "Nice! Keep going.";
        }
      }
    }

    function drawGrid() {
      const size = 40;
      ctx.strokeStyle = "rgba(255,255,255,0.04)";
      ctx.lineWidth = 1;

      for (let x = 0; x < canvas.width; x += size) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }

      for (let y = 0; y < canvas.height; y += size) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function drawObstacles() {
      for (const obs of obstacles) {
        ctx.fillStyle = "#b22222";
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

        ctx.strokeStyle = "#ff6b6b";
        ctx.lineWidth = 2;
        ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
      }
    }

    function drawFoods() {
      for (const food of foods) {
        ctx.beginPath();
        ctx.arc(food.x, food.y, food.radius + 4, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 0, 0.15)";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(food.x, food.y, food.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#ffeb3b";
        ctx.fill();
      }
    }

    function drawSnake() {
      for (let i = snake.segments.length - 1; i >= 0; i--) {
        const seg = snake.segments[i];
        const size = Math.max(6, snake.radius - i * 0.12);

        ctx.beginPath();
        ctx.arc(seg.x, seg.y, size, 0, Math.PI * 2);
        ctx.fillStyle = i === 0 ? "#2ecc71" : "#27ae60";
        ctx.fill();
      }

      const angle = Math.atan2(mouse.y - snake.y, mouse.x - snake.x);

      const eyeOffsetX = Math.cos(angle + Math.PI / 2) * 4;
      const eyeOffsetY = Math.sin(angle + Math.PI / 2) * 4;
      const eyeForwardX = Math.cos(angle) * 4;
      const eyeForwardY = Math.sin(angle) * 4;

      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(snake.x + eyeOffsetX + eyeForwardX, snake.y + eyeOffsetY + eyeForwardY, 2.5, 0, Math.PI * 2);
      ctx.arc(snake.x - eyeOffsetX + eyeForwardX, snake.y - eyeOffsetY + eyeForwardY, 2.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "black";
      ctx.beginPath();
      ctx.arc(snake.x + eyeOffsetX + eyeForwardX + 0.8, snake.y + eyeOffsetY + eyeForwardY + 0.8, 1.2, 0, Math.PI * 2);
      ctx.arc(snake.x - eyeOffsetX + eyeForwardX + 0.8, snake.y - eyeOffsetY + eyeForwardY + 0.8, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawOverlay() {
      if (!gameOver) return;

      ctx.fillStyle = "rgba(0,0,0,0.45)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.font = "bold 42px Arial";
      ctx.fillText(won ? "You Win!" : "Game Over", canvas.width / 2, canvas.height / 2 - 10);

      ctx.font = "20px Arial";
      ctx.fillText(
        won ? "You collected 10 pixels." : "You crashed into an obstacle.",
        canvas.width / 2,
        canvas.height / 2 + 30
      );
    }

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawGrid();

      if (!gameOver) {
        updateSnake();
        updateFood();
        checkSnakeCollision();
      }

      drawObstacles();
      drawFoods();
      drawSnake();
      drawOverlay();

      requestAnimationFrame(gameLoop);
    }

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener("resize", () => {
      resizeCanvas();
      resetGame();
    });

    restartBtn.addEventListener("click", resetGame);

    resizeCanvas();
    resetGame();
    gameLoop();
  </script>
</body>
</html>
